<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Barlas Trailer — Logo & Favicon</title>
<style>
:root{--navy:#0D2642;--blue:#1C7FD6}
*{box-sizing:border-box}body{margin:0;font-family:'Poppins',system-ui,Arial,sans-serif;color:var(--navy);background:#f4f7fb}
header{padding:40px 32px;border-bottom:1px solid #e3eaf2;background:#fff}
h1{margin:0;font-size:22px;letter-spacing:.5px}.sub{color:#6b7c90;margin-top:4px;font-size:14px}
.wrap{max-width:1000px;margin:0 auto;padding:32px}
.card{background:#fff;border:1px solid #e3eaf2;border-radius:16px;padding:28px;margin-bottom:24px}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:#7b8aa0;margin:0 0 18px}
.row{display:flex;gap:28px;align-items:center;flex-wrap:wrap}
.dark{background:linear-gradient(135deg,#0D2642,#0A3F86);border-radius:14px;padding:28px}
.tab{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid #d9e2ec;border-radius:8px 8px 0 0;padding:8px 14px;font-size:13px;color:#33404f}
.tab img{width:18px;height:18px;border-radius:4px}
.chips{display:flex;gap:22px;align-items:flex-end}
.chips figure{margin:0;text-align:center}.chips img{display:block;border-radius:8px}
.chips figcaption{font-size:11px;color:#90a0b3;margin-top:8px}
.sw{display:flex;gap:14px;flex-wrap:wrap}.sw div{display:flex;flex-direction:column;gap:6px;font-size:12px;color:#5b6b7d}
.dot{width:64px;height:64px;border-radius:10px;border:1px solid #00000010}
</style></head><body>
<header><h1>BARLAS TRAILER — Marka Kimliği</h1><div class="sub">Logo, amblem ve favicon · mavi-beyaz kurumsal palet</div></header>
<div class="wrap">
  <div class="card"><h2>Yatay Logo (açık zemin)</h2><img src="logo_horizontal.png" style="max-width:560px;width:100%"></div>
  <div class="card"><h2>Yatay Logo (koyu zemin)</h2><div class="dark"><img src="logo_horizontal_dark.png" style="max-width:560px;width:100%"></div></div>
  <div class="card"><h2>Amblem</h2><div class="row"><img src="emblem_512.png" width="160"><img src="emblem_512.png" width="96"><img src="emblem_512.png" width="56"></div></div>
  <div class="card"><h2>Favicon — tarayıcı sekmesi & boyutlar</h2>
    <div class="tab"><img src="favicon-32.png">Barlas Trailer | Silobas Dorse</div>
    <div style="height:18px"></div>
    <div class="chips">
      <figure><img src="favicon-512.png" width="64"><figcaption>64</figcaption></figure>
      <figure><img src="favicon-512.png" width="48"><figcaption>48</figcaption></figure>
      <figure><img src="favicon-512.png" width="32"><figcaption>32</figcaption></figure>
      <figure><img src="favicon-512.png" width="16"><figcaption>16</figcaption></figure>
    </div>
  </div>
  <div class="card"><h2>Renk Paleti</h2><div class="sw">
    <div><span class="dot" style="background:#1C7FD6"></span>#1C7FD6</div>
    <div><span class="dot" style="background:#0E5FB5"></span>#0E5FB5</div>
    <div><span class="dot" style="background:#0A3F86"></span>#0A3F86</div>
    <div><span class="dot" style="background:#0D2642"></span>#0D2642</div>
    <div><span class="dot" style="background:#FFFFFF"></span>#FFFFFF</div>
  </div></div>
</div></body></html>
